name: CI
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  buildtest:
    name: Test build on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          dotnet-version: '9.0.x'
      - name: Test with dotnet
        run: dotnet test --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.UseSourceLink=true
      - name: Collect reports
        run: |
            mkdir -p ./CollectedTestResults
            for x in `find . -path ./CollectedTestResults -prune -o -name 'coverage.cobertura.xml' -print`; do
                echo $x
                cp $x ./CollectedTestResults/`basename $(dirname $(dirname $(dirname ${x})))`.coverage.cobertura.xml
            done
      - name: Generate code coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@f927998465a9ea0bf31902b7f8e89389b14ceb77
        with:
          reports: ./CollectedTestResults/*.coverage.cobertura.xml
          targetdir: coveragereport
          reporttypes: Html;MarkdownSummaryGithub
      - name: Upload Code Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
            name: coveragereport
            path: ./coveragereport/
      - name: Publish coverage in build summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
